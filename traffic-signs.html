<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu Biển báo — QC 41:2024/BGTVT</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap&subset=vietnamese" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg:#0f0e0c;--bg2:#1a1814;--bg3:#242018;--card:#1e1c18;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f5f2ed;--muted:#a09890;--hint:#6b6560;
  --accent:#667eea;--grad:linear-gradient(135deg,#667eea,#764ba2);
  --red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--green:#10b981;
  --r:12px;--r2:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;height:58px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-brand{font-weight:800;font-size:1rem;color:var(--text);display:flex;align-items:center;gap:.4rem}
.topbar-brand span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.back-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .85rem;border:1px solid var(--border);border-radius:30px;background:transparent;color:var(--muted);text-decoration:none;font-size:.8rem;font-weight:600;transition:all .18s}
.back-btn:hover{color:var(--text)}
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1.2rem}

/* Hero */
.page-hero{text-align:center;padding:1.5rem 0 1.8rem}
.page-hero h1{font-size:1.9rem;font-weight:900;margin-bottom:.4rem}
.page-hero h1 span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-hero p{color:var(--muted);font-size:.9rem}
.legal-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .9rem;background:rgba(102,126,234,.1);border:1px solid rgba(102,126,234,.2);border-radius:20px;font-size:.75rem;font-weight:600;color:var(--accent);margin-bottom:1rem}

/* Search + Filters */
.search-wrap{display:flex;gap:.6rem;margin-bottom:1.2rem;flex-wrap:wrap}
.search-box{flex:1;min-width:240px;padding:.75rem 1rem;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:.9rem;transition:border-color .18s}
.search-box:focus{outline:none;border-color:var(--accent)}
.filter-group{display:flex;gap:.4rem;flex-wrap:wrap}
.filter-btn{padding:.5rem 1rem;border:1.5px solid var(--border);background:var(--card);border-radius:30px;color:var(--muted);font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;white-space:nowrap}
.filter-btn:hover,.filter-btn.active{border-color:transparent;color:#fff}
.filter-btn[data-cat="all"].active{background:linear-gradient(135deg,#667eea,#764ba2)}
.filter-btn[data-cat="cam"].active{background:var(--red)}
.filter-btn[data-cat="nguy-hiem"].active{background:var(--yellow);color:#000}
.filter-btn[data-cat="hieu-lenh"].active{background:var(--blue)}
.filter-btn[data-cat="chi-dan"].active{background:var(--green)}
.filter-btn[data-cat="phu"].active{background:#8b5cf6}
.filter-btn[data-cat="vach-son"].active{background:#f97316}

/* Grid */
.signs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}

/* Sign Card */
.sign-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);padding:1.1rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.sign-card:hover{border-color:rgba(102,126,234,.3);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.sign-visual{width:80px;height:80px;margin:0 auto .75rem;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:2rem;position:relative}
.sign-visual.cam{background:rgba(239,68,68,.12);border:3px solid var(--red)}
.sign-visual.nguy-hiem{background:rgba(245,158,11,.12);border:3px solid var(--yellow);border-radius:0;transform:rotate(0deg);clip-path:polygon(50% 0%,100% 100%,0% 100%)}
.sign-visual.hieu-lenh{background:rgba(59,130,246,.12);border:3px solid var(--blue)}
.sign-visual.chi-dan{background:rgba(16,185,129,.12);border:3px solid var(--green);border-radius:4px}
.sign-visual.phu{background:rgba(139,92,246,.12);border:3px solid #8b5cf6;border-radius:4px}
.sign-visual.vach-son{background:rgba(249,115,22,.12);border:3px solid #f97316;border-radius:4px}
.sign-code{font-size:.7rem;font-weight:700;color:var(--hint);text-align:center;margin-bottom:.3rem;font-family:monospace;letter-spacing:.05em}
.sign-name{font-size:.88rem;font-weight:700;text-align:center;margin-bottom:.4rem;line-height:1.35}
.sign-cat-tag{display:block;text-align:center;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;margin:0 auto}
.tag-cam{background:rgba(239,68,68,.15);color:var(--red)}
.tag-nguy-hiem{background:rgba(245,158,11,.15);color:var(--yellow)}
.tag-hieu-lenh{background:rgba(59,130,246,.15);color:var(--blue)}
.tag-chi-dan{background:rgba(16,185,129,.15);color:var(--green)}
.tag-phu{background:rgba(139,92,246,.15);color:#8b5cf6}
.tag-vach-son{background:rgba(249,115,22,.15);color:#f97316}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;display:none}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r2);max-width:600px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:1.2rem 1.4rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:1.1rem;font-weight:800}
.modal-close{width:32px;height:32px;border:none;background:var(--bg3);color:var(--muted);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .18s}
.modal-close:hover{background:var(--red);color:#fff}
.modal-body{padding:1.4rem}
.modal-visual{width:120px;height:120px;margin:0 auto 1.2rem;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:3.5rem}
.modal-code{text-align:center;font-family:monospace;font-size:.8rem;color:var(--hint);font-weight:700;margin-bottom:.3rem}
.modal-name{text-align:center;font-size:1.15rem;font-weight:800;margin-bottom:1rem}
.detail-row{display:grid;grid-template-columns:120px 1fr;gap:.6rem;padding:.7rem 0;border-bottom:1px solid var(--border);font-size:.87rem}
.detail-row:last-child{border-bottom:none}
.detail-label{font-weight:700;color:var(--muted);font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;align-self:start;padding-top:1px}
.detail-val{color:var(--text);line-height:1.65}
.detail-val.use-case{color:var(--muted);font-size:.83rem;line-height:1.6}
.modal-cat-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;margin-bottom:.75rem}

/* Empty / count */
.result-info{font-size:.82rem;color:var(--hint);margin-bottom:.9rem}

.no-results{text-align:center;padding:3rem;color:var(--hint)}
.no-results i{font-size:2.5rem;display:block;margin-bottom.75rem;color:var(--bg3)}

@media(max-width:600px){.signs-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Trang chủ</a>
  <div class="topbar-brand">🚦 Tra cứu <span>Biển báo</span></div>
  <div style="width:90px"></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h2 id="m-name">Chi tiết biển báo</h2>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-visual" id="m-visual"></div>
      <div class="modal-code" id="m-code"></div>
      <div class="modal-name" id="m-name2"></div>
      <span class="modal-cat-badge" id="m-catbadge"></span>
      <div id="m-details"></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="page-hero">
    <div class="legal-badge"><i class="fas fa-gavel"></i> QC 41:2024/BGTVT — Bộ GTVT Việt Nam</div>
    <h1>Tra cứu <span>Biển báo & Vạch sơn</span></h1>
    <p>Toàn bộ biển báo giao thông đường bộ theo Quy chuẩn kỹ thuật quốc gia QC 41:2024/BGTVT</p>

    <input class="search-box" type="text" id="search-inp" placeholder="🔍 Tìm theo tên, mã số, công dụng..." oninput="filterSigns()">
  </div>
  <div class="filter-group" style="margin-bottom:1.2rem">
    <button class="filter-btn active" data-cat="all" onclick="filterCat(this)">Tất cả</button>
    <button class="filter-btn" data-cat="cam" onclick="filterCat(this)">🔴 Biển cấm</button>
    <button class="filter-btn" data-cat="nguy-hiem" onclick="filterCat(this)">⚠️ Biển nguy hiểm</button>
    <button class="filter-btn" data-cat="hieu-lenh" onclick="filterCat(this)">🔵 Biển hiệu lệnh</button>
    <button class="filter-btn" data-cat="chi-dan" onclick="filterCat(this)">🟢 Biển chỉ dẫn</button>
    <button class="filter-btn" data-cat="phu" onclick="filterCat(this)">🟣 Biển phụ</button>
    <button class="filter-btn" data-cat="vach-son" onclick="filterCat(this)">🟠 Vạch sơn</button>
  </div>

  <div class="result-info" id="result-info">Đang tải dữ liệu...</div>
  <div class="signs-grid" id="signs-grid"></div>
</div>

];

let currentCat = 'all';
let searchVal  = '';

function render() {
  let filtered = SIGNS.filter(s => {
    if (currentCat !== 'all' && s.cat !== currentCat) return false;
    const q = searchVal.toLowerCase();
    if (q && !s.name.toLowerCase().includes(q) && !s.id.toLowerCase().includes(q) && !s.desc.toLowerCase().includes(q) && !(s.usecase||'').toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('result-info').textContent = `Hiển thị ${filtered.length} / ${SIGNS.length} mục`;
  const grid = document.getElementById('signs-grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><i class="fas fa-search"></i><br><br>Không tìm thấy kết quả cho "<strong>${searchVal}</strong>"</div>`;
    return;
  }
  grid.innerHTML = filtered.map(s => `
    <div class="sign-card" onclick="showModal('${s.id}')">
      <div class="sign-visual ${s.cat}" style="font-size:2.2rem">${s.icon}</div>
      <div class="sign-code">${s.id}</div>
      <div class="sign-name">${s.name}</div>
      <span class="sign-cat-tag tag-${s.cat}">${catLabel(s.cat)}</span>
    </div>`).join('');
}

function catLabel(c) {
  return {cam:'Biển cấm','nguy-hiem':'Nguy hiểm','hieu-lenh':'Hiệu lệnh','chi-dan':'Chỉ dẫn',phu:'Biển phụ','vach-son':'Vạch sơn'}[c]||c;
}
function catColor(c) {
  return {cam:'var(--red)','nguy-hiem':'var(--yellow)','hieu-lenh':'var(--blue)','chi-dan':'var(--green)',phu:'#8b5cf6','vach-son':'#f97316'}[c]||'var(--accent)';
}

function filterCat(el) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentCat = el.dataset.cat;
  render();
}
function filterSigns() {
  searchVal = document.getElementById('search-inp').value;
  render();
}

function showModal(id) {
  const s = SIGNS.find(x=>x.id===id);
  if (!s) return;
  document.getElementById('m-visual').innerHTML = `<div class="modal-visual ${s.cat}" style="font-size:3.5rem">${s.icon}</div>`;
  document.getElementById('m-visual').className = '';
  document.getElementById('m-code').textContent = s.id;
  document.getElementById('m-name').textContent = s.name;
  document.getElementById('m-name2').textContent = s.name;
  const badge = document.getElementById('m-catbadge');
  badge.textContent = catLabel(s.cat);
  badge.className = 'modal-cat-badge tag-'+s.cat;
  document.getElementById('m-details').innerHTML = `
    <div class="detail-row"><div class="detail-label">Công dụng</div><div class="detail-val">${s.desc}</div></div>
    <div class="detail-row"><div class="detail-label">Hình dạng</div><div class="detail-val">${s.shape||'—'}</div></div>
    <div class="detail-row"><div class="detail-label">Đặt ở đâu</div><div class="detail-val">${s.usage||'—'}</div></div>
    <div class="detail-row"><div class="detail-label">Trường hợp</div><div class="detail-val use-case">${s.usecase||'—'}</div></div>
  `;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target===document.getElementById('modal-bg')) {
    document.getElementById('modal-bg').classList.remove('open');
  }
}

render();
</script>
