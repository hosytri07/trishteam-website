<html lang="vi">
<head>
<meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng tin — TrishTeam</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap&subset=vietnamese" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --bg:#0f0e0c;--bg2:#1a1814;--bg3:#242018;--card:#1e1c18;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f5f2ed;--muted:#a09890;--hint:#6b6560;
  --accent:#667eea;--accent2:#764ba2;--grad:linear-gradient(135deg,#667eea,#764ba2);
  --red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--green:#10b981;
  --r:12px;--r2:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;height:58px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.topbar-brand{font-weight:800;font-size:1.1rem;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:.4rem}
.topbar-brand span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.back-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .85rem;border:1px solid var(--border);border-radius:30px;background:transparent;color:var(--muted);text-decoration:none;font-size:.8rem;font-weight:600;transition:all .18s}
.back-btn:hover{color:var(--text);border-color:var(--border2)}

.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1.2rem}

/* Category filter */
.cat-scroll{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1.2rem;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-btn{padding:.4rem .9rem;border-radius:30px;font-size:.8rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:inherit;transition:all .18s;white-space:nowrap;flex-shrink:0}
.cat-btn:hover,.cat-btn.active{background:var(--grad);color:#fff;border-color:transparent}

/* Post card */
.post-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);margin-bottom:1rem;overflow:hidden;transition:border-color .2s}
.post-card:hover{border-color:var(--border2)}
.post-thumb{width:100%;height:200px;object-fit:cover;display:block;background:var(--bg3)}
.post-thumb-placeholder{width:100%;height:160px;background:linear-gradient(135deg,var(--bg3),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:3rem}
.post-body{padding:1.1rem 1.2rem}
.post-meta-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.55rem;flex-wrap:wrap}
.post-cat{font-size:.7rem;font-weight:800;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em}
.cat-cong-nghe{background:rgba(102,126,234,.15);color:var(--accent)}
.cat-the-thao{background:rgba(16,185,129,.15);color:var(--green)}
.cat-thoi-su{background:rgba(239,68,68,.15);color:var(--red)}
.cat-kinh-te{background:rgba(245,158,11,.15);color:var(--yellow)}
.cat-xa-hoi{background:rgba(139,92,246,.15);color:#8b5cf6}
.cat-giai-tri{background:rgba(249,115,22,.15);color:#f97316}
.cat-giao-thong{background:rgba(59,130,246,.15);color:var(--blue)}
.post-time{font-size:.75rem;color:var(--hint)}
.post-views{font-size:.75rem;color:var(--hint);display:flex;align-items:center;gap:.2rem;margin-left:auto}
.post-title{font-size:1.05rem;font-weight:800;line-height:1.45;margin-bottom:.5rem;cursor:pointer;transition:color .15s}
.post-title:hover{color:var(--accent)}
.post-excerpt{font-size:.87rem;color:var(--muted);line-height:1.65;margin-bottom:.85rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-overflow:hidden;overflow:hidden}
.post-author{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}
.author-av{width:26px;height:26px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:#fff;flex-shrink:0}
.author-name{font-size:.8rem;font-weight:600;color:var(--muted)}

/* Actions bar */
.post-actions{display:flex;align-items:center;gap:.2rem;padding-top:.75rem;border-top:1px solid var(--border)}
.action-btn{display:flex;align-items:center;gap:.35rem;padding:.4rem .7rem;border-radius:var(--r);border:none;background:transparent;color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.action-btn:hover{background:var(--bg3);color:var(--text)}
.action-btn.liked{color:var(--red)}
.action-btn.hearted{color:#ec4899}
.action-btn-sep{flex:1}
.action-btn.share-btn:hover{color:var(--accent)}

/* ── POST DETAIL MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto;display:none}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r2);max-width:700px;width:100%;margin:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-topbar{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:10;border-radius:var(--r2) var(--r2) 0 0}
.modal-topbar h3{font-size:.9rem;font-weight:700;color:var(--muted)}
.btn-close{width:30px;height:30px;border:none;background:var(--bg3);color:var(--muted);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .15s}
.btn-close:hover{background:var(--red);color:#fff}
.modal-content{padding:1.4rem}
.modal-thumb{width:100%;border-radius:var(--r);margin-bottom:1.1rem;max-height:300px;object-fit:cover}
.modal-cat-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem}
.modal-title{font-size:1.3rem;font-weight:900;line-height:1.4;margin-bottom:.6rem}
.modal-author-row{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;padding-bottom:.85rem;border-bottom:1px solid var(--border)}
.modal-body-text{font-size:.93rem;line-height:1.85;color:var(--muted);white-space:pre-line}
.modal-body-text p{margin-bottom:.85rem}
.modal-actions{display:flex;align-items:center;gap:.4rem;padding:1rem 1.2rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}

/* Comments */
.comments-section{padding:1rem 1.2rem 1.4rem}
.comments-title{font-size:.9rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.85rem}
.comment-input-row{display:flex;gap:.5rem;margin-bottom:1rem}
.comment-input{flex:1;padding:.65rem .9rem;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:.87rem;transition:border-color .15s;resize:none}
.comment-input:focus{outline:none;border-color:var(--accent)}
.btn-post-comment{padding:.65rem 1rem;background:var(--grad);border:none;border-radius:var(--r);color:#fff;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-post-comment:hover{box-shadow:0 3px 12px rgba(102,126,234,.35)}
.btn-post-comment:disabled{opacity:.5;cursor:not-allowed}
.comment-item{display:flex;gap:.65rem;margin-bottom:.9rem}
.comment-av{width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px}
.comment-bubble{flex:1;background:var(--bg3);border-radius:0 var(--r) var(--r) var(--r);padding:.6rem .85rem}
.comment-name{font-size:.78rem;font-weight:700;margin-bottom:.25rem;color:var(--text)}
.comment-text{font-size:.85rem;color:var(--muted);line-height:1.55}
.comment-meta{display:flex;align-items:center;gap:.75rem;margin-top:.35rem}
.comment-time{font-size:.7rem;color:var(--hint)}
.comment-like{font-size:.72rem;font-weight:600;color:var(--hint);cursor:pointer;display:flex;align-items:center;gap:.2rem;border:none;background:transparent;font-family:inherit;transition:color .12s}
.comment-like:hover{color:var(--red)}
.comment-like.liked{color:var(--red)}
.comment-delete{font-size:.7rem;color:var(--hint);cursor:pointer;background:none;border:none;font-family:inherit;transition:color .12s;margin-left:auto}
.comment-delete:hover{color:var(--red)}
.no-comments{font-size:.85rem;color:var(--hint);text-align:center;padding:1rem 0}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skel-card{border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:1rem}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1.5px solid var(--border2);border-radius:var(--r);padding:.6rem 1.2rem;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:.5rem;transition:transform .28s;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok i{color:var(--green)}.toast.err i{color:var(--red)}.toast.info i{color:var(--blue)}

/* Empty feed */
.feed-empty{text-align:center;padding:4rem 1rem;color:var(--hint)}
.feed-empty i{font-size:3rem;display:block;margin-bottom:1rem;opacity:.3}

/* ── GLOBAL ANIMATED BG ── */
body::before {
    content:'';position:fixed;inset:0;z-index:-2;
    background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(102,126,234,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 85% 70%, rgba(118,75,162,0.09) 0%, transparent 60%);
    animation: gbgMove 25s ease-in-out infinite;
    pointer-events:none;
}
body::after {
    content:'';position:fixed;inset:0;z-index:-1;
    background-image:
        linear-gradient(rgba(102,126,234,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(102,126,234,0.04) 1px, transparent 1px);
    background-size:60px 60px;
    pointer-events:none;
}
@keyframes gbgMove {
    0%,100%{transform:translate(0,0) scale(1)}
    33%{transform:translate(18px,-12px) scale(1.02)}
    66%{transform:translate(-12px,18px) scale(0.98)}
}
</style>

</head>
<body>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<div class="topbar">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Trang chủ</a>
  <a href="index.html" class="topbar-brand">✨ Trish<span>Feed</span></a>
  <div style="width:90px"></div>
</div>

<!-- Post Detail Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeMFromBg(event)">
  <div class="modal" id="post-modal">
    <div class="modal-topbar">
      <h3 id="m-catline">Bài viết</h3>
      <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-content">
      <img id="m-thumb" class="modal-thumb" style="display:none" alt="">
      <div class="modal-cat-row">
        <span class="post-cat" id="m-cat"></span>
        <span class="post-time" id="m-time"></span>
        <span class="post-views" id="m-views"><i class="fas fa-eye"></i> 0</span>
      </div>
      <h2 class="modal-title" id="m-title"></h2>
      <div class="modal-author-row">
        <div class="author-av" id="m-av">A</div>
        <span class="author-name" id="m-author"></span>
      </div>
      <div class="modal-body-text" id="m-body"></div>
    </div>
    <div class="modal-actions" id="m-actions"></div>
    <div class="comments-section">
      <div class="comments-title"><i class="fas fa-comments"></i> Bình luận</div>
      <div class="comment-input-row" id="comment-input-row">
        <textarea class="comment-input" id="comment-inp" placeholder="Viết bình luận..." rows="2"></textarea>
        <button class="btn-post-comment" id="btn-comment" onclick="postComment()">Gửi</button>
      </div>
      <div id="comments-list"><div class="no-comments">Chưa có bình luận nào.</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="t-msg"></span></div>

<div class="wrap">
  <!-- Category filter -->
  <div class="cat-scroll" id="cat-scroll">
    <button class="cat-btn active" data-cat="all" onclick="filterCat(this)">🔥 Tất cả</button>
    <button class="cat-btn" data-cat="cong-nghe" onclick="filterCat(this)">💻 Công nghệ</button>
    <button class="cat-btn" data-cat="the-thao" onclick="filterCat(this)">⚽ Thể thao</button>
    <button class="cat-btn" data-cat="thoi-su" onclick="filterCat(this)">📰 Thời sự</button>
    <button class="cat-btn" data-cat="kinh-te" onclick="filterCat(this)">📈 Kinh tế</button>
    <button class="cat-btn" data-cat="xa-hoi" onclick="filterCat(this)">👥 Xã hội</button>
    <button class="cat-btn" data-cat="giai-tri" onclick="filterCat(this)">🎬 Giải trí</button>
    <button class="cat-btn" data-cat="giao-thong" onclick="filterCat(this)">🚦 Giao thông</button>
  </div>
  <!-- Feed -->
  <div id="feed-container">
    <!-- Skeleton loading -->
    <div class="skel-card">
      <div class="skeleton" style="height:160px"></div>
      <div style="padding:1rem">
        <div class="skeleton" style="height:14px;width:40%;margin-bottom:.5rem"></div>
        <div class="skeleton" style="height:20px;margin-bottom:.4rem"></div>
        <div class="skeleton" style="height:14px;width:80%"></div>
      </div>
    </div>
    <div class="skel-card">
      <div style="padding:1rem">
        <div class="skeleton" style="height:14px;width:30%;margin-bottom:.5rem"></div>
        <div class="skeleton" style="height:20px;margin-bottom:.4rem"></div>
        <div class="skeleton" style="height:14px;width:90%"></div>
      </div>
    </div>
  </div>
</div>

<script>
const FB = {
  apiKey:"AIzaSyDPyh1aJXNQUZ9ueyq3pR_jsnTw1C_t0Kc",
  authDomain:"trishteam-e3ae4.firebaseapp.com",
  databaseURL:"https://trishteam-e3ae4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"trishteam-e3ae4",
  storageBucket:"trishteam-e3ae4.firebasestorage.app",
  messagingSenderId:"930627527626",
  appId:"1:930627527626:web:9018c3afbcb6ee819ae533"
};
if (!firebase.apps.length) firebase.initializeApp(FB);
const auth = firebase.auth();
const db   = firebase.database();

let currentUser = null;
let currentCat  = 'all';
let activePid   = null;
let allPosts    = {};

// CAT CONFIG
const CATS = {
  'cong-nghe':  {label:'Công nghệ', cls:'cat-cong-nghe', emoji:'💻'},
  'the-thao':   {label:'Thể thao',  cls:'cat-the-thao',  emoji:'⚽'},
  'thoi-su':    {label:'Thời sự',   cls:'cat-thoi-su',   emoji:'📰'},
  'kinh-te':    {label:'Kinh tế',   cls:'cat-kinh-te',   emoji:'📈'},
  'xa-hoi':     {label:'Xã hội',    cls:'cat-xa-hoi',    emoji:'👥'},
  'giai-tri':   {label:'Giải trí',  cls:'cat-giai-tri',  emoji:'🎬'},
  'giao-thong': {label:'Giao thông',cls:'cat-giao-thong',emoji:'🚦'},
};

auth.onAuthStateChanged(u => {
  currentUser = u;
  // Hide comment input if not logged in
  if (!u) {
    const row = document.getElementById('comment-input-row');
    if (row) row.innerHTML = '<p style="font-size:.82rem;color:var(--hint);padding:.5rem 0"><a href="login.html" style="color:var(--accent)">Đăng nhập</a> để bình luận.</p>';
  }
});

// ── LOAD FEED ──
db.ref('posts').orderByChild('timestamp').on('value', snap => {
  allPosts = {};
  if (snap.exists()) {
    snap.forEach(c => {
      const p = c.val();
      if (p.published) allPosts[c.key] = { ...p, id: c.key };
    });
  }
  renderFeed();
});

function renderFeed() {
  let posts = Object.values(allPosts)
    .filter(p => currentCat === 'all' || p.category === currentCat)
    .sort((a,b) => (b.timestamp||0) - (a.timestamp||0));

  const container = document.getElementById('feed-container');

  if (!posts.length) {
    container.innerHTML = `<div class="feed-empty"><i class="fas fa-newspaper"></i><p>Chưa có bài viết nào${currentCat!=='all'?' trong mục này':''}.</p></div>`;
    return;
  }

  container.innerHTML = posts.map(p => buildCard(p)).join('');
}

function buildCard(p) {
  const cat    = CATS[p.category] || {label:p.category,cls:'cat-cong-nghe',emoji:'📄'};
  const likes  = Object.keys(p.likes||{}).length;
  const cmts   = Object.keys(p.comments||{}).length;
  const isLiked = currentUser && p.likes && p.likes[currentUser.uid];
  const ts     = p.timestamp ? timeAgo(p.timestamp) : '';
  const thumb  = p.thumbnail
    ? `<img src="${p.thumbnail}" class="post-thumb" alt="${p.title}" onerror="this.style.display='none'">`
    : `<div class="post-thumb-placeholder">${cat.emoji}</div>`;

  return `
  <div class="post-card" id="card-${p.id}">
    <div onclick="openPost('${p.id}')" style="cursor:pointer">${thumb}</div>
    <div class="post-body">
      <div class="post-meta-top">
        <span class="post-cat ${cat.cls}">${cat.label}</span>
        <span class="post-time">${ts}</span>
        <span class="post-views"><i class="fas fa-eye"></i> ${p.views||0}</span>
      </div>
      <div class="post-title" onclick="openPost('${p.id}')">${p.title}</div>
      <div class="post-excerpt">${p.excerpt || p.content?.slice(0,180) || ''}</div>
      <div class="post-author">
        <div class="author-av">${(p.author||'A')[0].toUpperCase()}</div>
        <span class="author-name">${p.author||'Admin'}</span>
      </div>
      <div class="post-actions">
        <button class="action-btn ${isLiked?'liked':''}" onclick="toggleLike('${p.id}',event)">
          <i class="fas fa-heart"></i> <span id="like-${p.id}">${likes}</span>
        </button>
        <button class="action-btn" onclick="openPost('${p.id}','comments')">
          <i class="fas fa-comment"></i> ${cmts}
        </button>
        <span class="action-btn-sep"></span>
        <button class="action-btn share-btn" onclick="sharePost('${p.id}',event)">
          <i class="fas fa-share-nodes"></i> Chia sẻ
        </button>
      </div>
    </div>
  </div>`;
}

// ── OPEN POST ──
function openPost(pid, scrollTo) {
  const p = allPosts[pid];
  if (!p) return;
  activePid = pid;

  // Increment views
  db.ref(`posts/${pid}/views`).transaction(v => (v||0)+1);

  const cat = CATS[p.category] || {label:p.category,cls:'cat-cong-nghe'};
  const likes = Object.keys(p.likes||{}).length;
  const isLiked = currentUser && p.likes && p.likes[currentUser.uid];
  const isHearted = currentUser && p.hearts && p.hearts[currentUser.uid];

  document.getElementById('m-catline').textContent = cat.label + ' · Bài viết';
  const thumb = document.getElementById('m-thumb');
  if (p.thumbnail) { thumb.src = p.thumbnail; thumb.style.display='block'; }
  else { thumb.style.display='none'; }

  document.getElementById('m-cat').textContent   = cat.label;
  document.getElementById('m-cat').className     = 'post-cat ' + cat.cls;
  document.getElementById('m-time').textContent  = p.timestamp ? timeAgo(p.timestamp) : '';
  document.getElementById('m-views').innerHTML   = `<i class="fas fa-eye"></i> ${p.views||0}`;
  document.getElementById('m-title').textContent = p.title;
  document.getElementById('m-av').textContent    = (p.author||'A')[0].toUpperCase();
  document.getElementById('m-author').textContent = p.author||'Admin';
  document.getElementById('m-body').textContent   = p.content||'';

  // Actions
  const hearts = Object.keys(p.hearts||{}).length;
  document.getElementById('m-actions').innerHTML = `
    <button class="action-btn ${isLiked?'liked':''}" id="m-like-btn" onclick="toggleLike('${pid}')">
      <i class="fas fa-heart"></i> <span id="m-like-cnt">${likes}</span> Thích
    </button>
    <button class="action-btn ${isHearted?'hearted':''}" id="m-heart-btn" onclick="toggleHeart('${pid}')">
      <i class="fas fa-face-smile-hearts"></i> <span id="m-heart-cnt">${hearts}</span> Cảm xúc
    </button>
    <span class="action-btn-sep"></span>
    <button class="action-btn share-btn" onclick="sharePost('${pid}')">
      <i class="fas fa-share-nodes"></i> Chia sẻ
    </button>
  `;

  document.getElementById('modal-bg').classList.add('open');
  loadComments(pid);

  if (scrollTo === 'comments') {
    setTimeout(() => document.querySelector('.comments-section')?.scrollIntoView({behavior:'smooth'}), 300);
  }
}

function closeModal()  { document.getElementById('modal-bg').classList.remove('open'); activePid=null; }
function closeMFromBg(e) { if (e.target===document.getElementById('modal-bg')) closeModal(); }

// ── LIKE / HEART ──
function toggleLike(pid, e) {
  if (e) e.stopPropagation();
  if (!currentUser) { toast('Đăng nhập để thích bài viết!','info'); return; }
  const ref  = db.ref(`posts/${pid}/likes/${currentUser.uid}`);
  const card = allPosts[pid];
  const had  = card?.likes?.[currentUser.uid];
  if (had) { ref.remove(); if(card.likes) delete card.likes[currentUser.uid]; }
  else     { ref.set(true); if(!card.likes) card.likes={}; card.likes[currentUser.uid]=true; }
  const cnt = Object.keys(card?.likes||{}).length;
  const el1 = document.getElementById('like-'+pid);
  const el2 = document.getElementById('m-like-cnt');
  if (el1) el1.textContent = cnt;
  if (el2) el2.textContent = cnt;
  const btn = document.getElementById('m-like-btn');
  if (btn) btn.classList.toggle('liked', !had);
}

function toggleHeart(pid) {
  if (!currentUser) { toast('Đăng nhập để thể hiện cảm xúc!','info'); return; }
  const ref = db.ref(`posts/${pid}/hearts/${currentUser.uid}`);
  const card = allPosts[pid];
  const had  = card?.hearts?.[currentUser.uid];
  if (had) { ref.remove(); if(card.hearts) delete card.hearts[currentUser.uid]; }
  else     { ref.set(true); if(!card.hearts) card.hearts={}; card.hearts[currentUser.uid]=true; }
  const cnt = Object.keys(card?.hearts||{}).length;
  const el  = document.getElementById('m-heart-cnt');
  if (el) el.textContent = cnt;
  const btn = document.getElementById('m-heart-btn');
  if (btn) btn.classList.toggle('hearted', !had);
}

// ── SHARE ──
function sharePost(pid, e) {
  if (e) e.stopPropagation();
  const p    = allPosts[pid];
  const url  = window.location.origin + window.location.pathname + '?post=' + pid;
  if (navigator.share) {
    navigator.share({ title: p?.title||'TrishTeam', text: p?.excerpt||'', url })
      .catch(() => copyUrl(url));
  } else { copyUrl(url); }
}
function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => toast('Đã sao chép link!'))
    .catch(() => toast('Không thể sao chép link','err'));
}

// ── COMMENTS ──
function loadComments(pid) {
  const list = document.getElementById('comments-list');
  list.innerHTML = '<div class="no-comments"><i class="fas fa-spinner fa-spin"></i> Đang tải...</div>';
  db.ref(`comments/${pid}`).orderByChild('timestamp').on('value', snap => {
    if (!snap.exists()) {
      list.innerHTML = '<div class="no-comments">Chưa có bình luận nào.</div>';
      return;
    }
    const items = [];
    snap.forEach(c => items.push({id:c.key, ...c.val()}));
    list.innerHTML = items.reverse().map(c => buildComment(c, pid)).join('');
  });
}

function buildComment(c, pid) {
  const isLiked  = currentUser && c.likes && c.likes[currentUser.uid];
  const likeCnt  = Object.keys(c.likes||{}).length;
  const isMine   = currentUser && c.uid === currentUser.uid;
  const ts       = c.timestamp ? timeAgo(c.timestamp) : '';
  return `
  <div class="comment-item" id="cmt-${c.id}">
    <div class="comment-av">${(c.name||'?')[0].toUpperCase()}</div>
    <div class="comment-bubble">
      <div class="comment-name">${c.name||'Ẩn danh'}</div>
      <div class="comment-text">${escHtml(c.text||'')}</div>
      <div class="comment-meta">
        <span class="comment-time">${ts}</span>
        <button class="comment-like ${isLiked?'liked':''}" onclick="likeComment('${pid}','${c.id}')">
          <i class="fas fa-heart"></i> ${likeCnt||''}
        </button>
        ${isMine ? `<button class="comment-delete" onclick="deleteComment('${pid}','${c.id}')"><i class="fas fa-trash"></i></button>` : ''}
      </div>
    </div>
  </div>`;
}

async function postComment() {
  if (!currentUser) { toast('Đăng nhập để bình luận!','info'); return; }
  const inp  = document.getElementById('comment-inp');
  const text = inp.value.trim();
  if (!text || !activePid) return;
  const btn = document.getElementById('btn-comment');
  btn.disabled = true;
  const cid  = 'c_' + Date.now();
  await db.ref(`comments/${activePid}/${cid}`).set({
    uid: currentUser.uid,
    name: currentUser.displayName || currentUser.email.split('@')[0],
    text,
    timestamp: Date.now(),
    likes: {}
  });
  inp.value = '';
  btn.disabled = false;
}

function likeComment(pid, cid) {
  if (!currentUser) return;
  const ref = db.ref(`comments/${pid}/${cid}/likes/${currentUser.uid}`);
  ref.once('value', s => s.exists() ? ref.remove() : ref.set(true));
}

function deleteComment(pid, cid) {
  if (!confirm('Xoá bình luận này?')) return;
  db.ref(`comments/${pid}/${cid}`).remove();
}

// ── FILTER ──
function filterCat(el) {
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentCat = el.dataset.cat;
  renderFeed();
}

// ── UTILS ──
function timeAgo(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s < 60)   return 'vừa xong';
  if (s < 3600) return Math.floor(s/60) + ' phút trước';
  if (s < 86400) return Math.floor(s/3600) + ' giờ trước';
  if (s < 604800) return Math.floor(s/86400) + ' ngày trước';
  return new Date(ts).toLocaleDateString('vi-VN');
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  const icons = {ok:'check-circle',err:'times-circle',info:'info-circle'};
  t.className = 'toast '+type+' show';
  t.querySelector('i').className = 'fas fa-'+icons[type];
  document.getElementById('t-msg').textContent = msg;
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// Check URL param for direct post link
const urlPid = new URLSearchParams(location.search).get('post');
if (urlPid) {
  const check = setInterval(() => {
    if (allPosts[urlPid]) { clearInterval(check); openPost(urlPid); }
  }, 300);
  setTimeout(() => clearInterval(check), 5000);
}
</script>
