<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrishNotes — Ghi chú cá nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap&subset=vietnamese" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg:#0f0e0c;--bg2:#1a1814;--bg3:#242018;--card:#1e1c18;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f5f2ed;--muted:#a09890;--hint:#6b6560;
  --accent:#667eea;--accent2:#764ba2;--grad:linear-gradient(135deg,#667eea,#764ba2);
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
  --r:10px;--r2:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;height:58px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;flex-shrink:0}
.topbar-brand{font-weight:800;font-size:1.1rem;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:.4rem}
.topbar-brand span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.back-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .85rem;border:1px solid var(--border);border-radius:30px;background:transparent;color:var(--muted);text-decoration:none;font-size:.8rem;font-weight:600;transition:all .18s}
.back-btn:hover{color:var(--text);border-color:var(--border2)}
.topbar-actions{display:flex;align-items:center;gap:.5rem}
.btn-icon-sm{width:34px;height:34px;border:1.5px solid var(--border);background:transparent;color:var(--muted);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.88rem;transition:all .18s;font-family:inherit}
.btn-icon-sm:hover{border-color:var(--accent);color:var(--accent)}

/* GATE */
#gate{flex:1;display:flex;align-items:center;justify-content:center}
.gate-box{text-align:center;padding:3rem 2rem}
.gate-box .icon{font-size:3rem;margin-bottom:1rem}
.gate-box h2{font-size:1.4rem;font-weight:700;margin-bottom:.5rem}
.gate-box p{color:var(--muted);margin-bottom:1.5rem;font-size:.9rem}
.gate-box a{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;background:var(--grad);border-radius:40px;color:#fff;text-decoration:none;font-weight:700;font-size:.9rem}

/* MAIN LAYOUT */
#app{flex:1;display:none;overflow:hidden;height:calc(100vh - 58px)}
.layout{display:grid;grid-template-columns:280px 1fr;height:100%}

/* SIDEBAR */
.notes-sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:.85rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:.5rem;flex-shrink:0}
.btn-new-note{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.65rem;background:var(--grad);border:none;border-radius:var(--r);color:#fff;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .18s}
.btn-new-note:hover{box-shadow:0 4px 14px rgba(102,126,234,.35)}
.search-input{width:100%;padding:.6rem .85rem;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:.85rem;transition:border-color .18s}
.search-input:focus{outline:none;border-color:var(--accent)}

/* FOLDER TABS */
.folder-tabs{display:flex;gap:.3rem;padding:.6rem .85rem;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.folder-tab{padding:.3rem .7rem;border-radius:20px;font-size:.75rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;background:transparent;color:var(--muted);font-family:inherit;transition:all .18s}
.folder-tab:hover,.folder-tab.active{background:rgba(102,126,234,.12);color:var(--accent);border-color:rgba(102,126,234,.2)}
.folder-tab.add{color:var(--hint);border-style:dashed;border-color:var(--border)}

/* NOTE LIST */
.notes-list{flex:1;overflow-y:auto;padding:.5rem}
.notes-list::-webkit-scrollbar{width:3px}
.notes-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.note-item{padding:.75rem .9rem;border-radius:var(--r);cursor:pointer;transition:all .18s;margin-bottom:3px;border:1.5px solid transparent;position:relative}
.note-item:hover{background:var(--bg3)}
.note-item.active{background:rgba(102,126,234,.1);border-color:rgba(102,126,234,.2)}
.note-item-title{font-size:.9rem;font-weight:600;margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-preview{font-size:.76rem;color:var(--hint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-meta{display:flex;align-items:center;justify-content:space-between;margin-top:.3rem}
.note-item-date{font-size:.7rem;color:var(--hint)}
.note-item-tag{font-size:.65rem;padding:1px 6px;border-radius:10px;font-weight:700}
.tag-personal{background:rgba(102,126,234,.15);color:var(--accent)}
.tag-work{background:rgba(245,158,11,.15);color:var(--yellow)}
.tag-project{background:rgba(16,185,129,.15);color:var(--green)}
.tag-idea{background:rgba(239,68,68,.15);color:var(--red)}
.tag-github{background:rgba(59,130,246,.15);color:var(--blue)}

.note-pin{position:absolute;top:.5rem;right:.5rem;color:var(--yellow);font-size:.7rem;opacity:0.8}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--hint)}
.empty-state i{font-size:2.5rem;margin-bottom:.75rem;display:block;color:var(--bg3)}
.empty-state p{font-size:.85rem}

/* EDITOR */
.note-editor{display:flex;flex-direction:column;height:100%;background:var(--bg)}
.editor-toolbar{display:flex;align-items:center;gap:.4rem;padding:.7rem 1rem;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;flex-shrink:0}
.toolbar-title{flex:1;min-width:200px;padding:.5rem .7rem;background:transparent;border:1.5px solid transparent;border-radius:var(--r);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;font-size:1rem;font-weight:700;transition:border-color .18s}
.toolbar-title:focus{outline:none;border-color:var(--border2)}
.toolbar-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.tb-btn{width:30px;height:30px;border:none;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s;font-family:inherit}
.tb-btn:hover{background:var(--bg3);color:var(--text)}
.tb-btn.active{background:rgba(102,126,234,.15);color:var(--accent)}

.tag-selector{display:flex;align-items:center;gap:.3rem;padding:.5rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tag-selector::-webkit-scrollbar{height:2px}
.tag-chip{padding:.2rem .65rem;border-radius:20px;font-size:.72rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap}
.tag-chip:hover,.tag-chip.selected{background:rgba(102,126,234,.12);color:var(--accent);border-color:rgba(102,126,234,.2)}
.tag-chip[data-tag="work"].selected{background:rgba(245,158,11,.12);color:var(--yellow);border-color:rgba(245,158,11,.2)}
.tag-chip[data-tag="project"].selected{background:rgba(16,185,129,.12);color:var(--green);border-color:rgba(16,185,129,.2)}
.tag-chip[data-tag="idea"].selected{background:rgba(239,68,68,.12);color:var(--red);border-color:rgba(239,68,68,.2)}
.tag-chip[data-tag="github"].selected{background:rgba(59,130,246,.12);color:var(--blue);border-color:rgba(59,130,246,.2)}
.tag-label{font-size:.75rem;color:var(--hint);margin-right:.2rem;white-space:nowrap}

.editor-body{flex:1;overflow:hidden;position:relative}
.note-textarea{width:100%;height:100%;padding:1.5rem;background:transparent;border:none;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;font-size:.95rem;line-height:1.8;resize:none;tab-size:2}
.note-textarea:focus{outline:none}
.note-textarea::placeholder{color:var(--hint)}

.editor-footer{padding:.5rem 1rem;border-top:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.footer-info{font-size:.75rem;color:var(--hint);display:flex;align-items:center;gap.75rem}
.footer-info span{margin-right:.75rem}
.save-status{font-size:.75rem;color:var(--green);display:flex;align-items:center;gap:.3rem}
.save-status.saving{color:var(--yellow)}
.save-status.unsaved{color:var(--red)}

/* Empty editor */
.editor-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.75rem;color:var(--hint)}
.editor-empty i{font-size:3rem;color:var(--bg3)}

/* GitHub section */
.github-panel{padding:1rem;display:flex;flex-direction:column;gap:.75rem}
.github-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);padding:1rem 1.1rem;transition:all .18s}
.github-card:hover{border-color:rgba(59,130,246,.3)}
.github-card-head{display:flex;align-items:center;gap:.7rem;margin-bottom:.5rem}
.github-card-head i{color:var(--blue);font-size:1rem}
.github-card-title{font-weight:700;font-size:.92rem;text-decoration:none;color:var(--text)}
.github-card-title:hover{color:var(--blue)}
.github-card-desc{font-size:.8rem;color:var(--muted);line-height:1.5;margin-bottom:.5rem}
.github-card-note{font-size:.78rem;color:var(--hint);font-style:italic;background:var(--bg3);border-radius:6px;padding:.35rem .65rem}
.github-card-meta{display:flex;align-items:center;gap.75rem;margin-top:.5rem;font-size:.72rem;color:var(--hint)}
.github-card-meta span{display:flex;align-items:center;gap.3rem;margin-right:.75rem}

/* Context menu */
.ctx-menu{position:fixed;background:var(--card);border:1.5px solid var(--border2);border-radius:var(--r);padding:.35rem;z-index:1000;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
.ctx-menu.show{display:block}
.ctx-item{padding:.5rem .85rem;font-size:.83rem;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:.5rem;color:var(--text);transition:background .12s}
.ctx-item:hover{background:var(--bg3)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:rgba(239,68,68,.08)}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1.5px solid var(--border2);border-radius:var(--r);padding:.6rem 1.2rem;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:.5rem;transition:transform .28s;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok i{color:var(--green)}.toast.err i{color:var(--red)}.toast.info i{color:var(--blue)}

@media(max-width:700px){
  .layout{grid-template-columns:1fr}
  .notes-sidebar{display:none}
  .notes-sidebar.mobile-show{display:flex;position:fixed;inset:58px 0 0 0;z-index:100}
}
</style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<div class="topbar">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Trang chủ</a>
  <a href="index.html" class="topbar-brand">✨ Trish<span>Notes</span></a>
  <div class="topbar-actions">
    <button class="btn-icon-sm" onclick="toggleView()" title="Đổi chế độ xem" id="view-toggle"><i class="fas fa-th"></i></button>
    <button class="btn-icon-sm" onclick="exportNote()" title="Xuất ghi chú"><i class="fas fa-download"></i></button>
  </div>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="t-msg"></span></div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" onclick="pinNote()"><i class="fas fa-thumbtack"></i> Ghim / Bỏ ghim</div>
  <div class="ctx-item" onclick="duplicateNote()"><i class="fas fa-copy"></i> Nhân đôi</div>
  <div class="ctx-item" onclick="moveNote()"><i class="fas fa-folder"></i> Chuyển thư mục</div>
  <div class="ctx-item danger" onclick="deleteNote()"><i class="fas fa-trash"></i> Xoá ghi chú</div>
</div>

<!-- Gate -->
<div id="gate">
  <div class="gate-box">
    <div class="icon">📝</div>
    <h2>TrishNotes</h2>
    <p>Ghi chú cá nhân, quản lý dự án, repo GitHub<br>Đồng bộ qua mọi thiết bị — cần đăng nhập</p>
    <a href="login.html"><i class="fas fa-sign-in-alt"></i> Đăng nhập</a>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="layout">
    <!-- Sidebar -->
    <div class="notes-sidebar" id="notes-sidebar">
      <div class="sidebar-top">
        <button class="btn-new-note" onclick="newNote()"><i class="fas fa-plus"></i> Ghi chú mới</button>
        <input class="search-input" type="text" placeholder="🔍 Tìm kiếm..." id="search-inp" oninput="filterNotes()">
      </div>
      <div class="folder-tabs" id="folder-tabs">
        <button class="folder-tab active" data-folder="all" onclick="switchFolder(this)">Tất cả</button>
        <button class="folder-tab" data-folder="personal" onclick="switchFolder(this)">Cá nhân</button>
        <button class="folder-tab" data-folder="work" onclick="switchFolder(this)">Công việc</button>
        <button class="folder-tab" data-folder="project" onclick="switchFolder(this)">Dự án</button>
        <button class="folder-tab" data-folder="github" onclick="switchFolder(this)">GitHub</button>
        <button class="folder-tab add" onclick="addFolder()"><i class="fas fa-plus"></i></button>
      </div>
      <div class="notes-list" id="notes-list">
        <div class="empty-state"><i class="fas fa-sticky-note"></i><p>Chưa có ghi chú nào.<br>Bấm <strong>+ Ghi chú mới</strong> để bắt đầu.</p></div>
      </div>
    </div>

    <!-- Editor -->
    <div class="note-editor" id="note-editor">
      <!-- Empty state -->
      <div class="editor-empty" id="editor-empty">
        <i class="fas fa-feather-alt"></i>
        <p style="font-size:.9rem;color:var(--hint)">Chọn một ghi chú hoặc tạo mới</p>
        <button onclick="newNote()" style="margin-top:.5rem;padding:.6rem 1.2rem;background:var(--grad);border:none;border-radius:30px;color:#fff;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer">+ Tạo ghi chú đầu tiên</button>
      </div>
      <!-- Active editor (hidden by default) -->
      <div id="editor-active" style="display:none;flex-direction:column;height:100%;flex:1">
        <div class="editor-toolbar">
          <input class="toolbar-title" type="text" id="note-title" placeholder="Tiêu đề ghi chú..." oninput="markUnsaved()">
          <span class="toolbar-sep"></span>
          <button class="tb-btn" onclick="fmt('bold')" title="In đậm"><i class="fas fa-bold"></i></button>
          <button class="tb-btn" onclick="fmt('italic')" title="In nghieng"><i class="fas fa-italic"></i></button>
          <button class="tb-btn" onclick="insertCheckbox()" title="Checkbox"><i class="fas fa-check-square"></i></button>
          <button class="tb-btn" onclick="insertHeading()" title="Tiêu đề"><i class="fas fa-heading"></i></button>
          <button class="tb-btn" onclick="insertLink()" title="Thêm link"><i class="fas fa-link"></i></button>
          <button class="tb-btn" onclick="insertCode()" title="Code block"><i class="fas fa-code"></i></button>
          <span class="toolbar-sep"></span>
          <button class="tb-btn" onclick="togglePin()" id="btn-pin" title="Ghim"><i class="fas fa-thumbtack"></i></button>
          <button class="tb-btn danger" onclick="deleteNote()" title="Xoá" style="color:var(--red)"><i class="fas fa-trash"></i></button>
        </div>
        <div class="tag-selector">
          <span class="tag-label">Tag:</span>
          <button class="tag-chip" data-tag="personal" onclick="toggleTag(this)">Cá nhân</button>
          <button class="tag-chip" data-tag="work" onclick="toggleTag(this)">Công việc</button>
          <button class="tag-chip" data-tag="project" onclick="toggleTag(this)">Dự án</button>
          <button class="tag-chip" data-tag="idea" onclick="toggleTag(this)">Ý tưởng</button>
          <button class="tag-chip" data-tag="github" onclick="toggleTag(this)">GitHub</button>
        </div>
        <div class="editor-body">
          <textarea class="note-textarea" id="note-body" placeholder="Bắt đầu viết ghi chú...&#10;&#10;Mẹo: Dùng # để tạo tiêu đề, - để tạo danh sách, [ ] để tạo checkbox" oninput="markUnsaved()"></textarea>
        </div>
        <div class="editor-footer">
          <div class="footer-info">
            <span id="word-count">0 từ</span>
            <span id="char-count">0 ký tự</span>
            <span id="note-date" style="color:var(--hint)"></span>
          </div>
          <div class="save-status" id="save-status"><i class="fas fa-check"></i> Đã lưu</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const FB_CONFIG = {
  apiKey:"AIzaSyDPyh1aJXNQUZ9ueyq3pR_jsnTw1C_t0Kc",
  authDomain:"trishteam-e3ae4.firebaseapp.com",
  databaseURL:"https://trishteam-e3ae4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"trishteam-e3ae4",
  storageBucket:"trishteam-e3ae4.firebasestorage.app",
  messagingSenderId:"930627527626",
  appId:"1:930627527626:web:9018c3afbcb6ee819ae533"
};
if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
const auth = firebase.auth();
const db   = firebase.database();

// ── STATE ──
let currentUser = null;
let notes       = {};          // { id: noteObj }
let activeId    = null;
let currentFolder = 'all';
let saveTimer   = null;
let ctxTargetId = null;

const COLORS = { personal:'personal', work:'work', project:'project', idea:'idea', github:'github' };

// ── AUTH ──
auth.onAuthStateChanged(user => {
  if (!user) {
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('app').style.display  = 'none';
    return;
  }
  currentUser = user;
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display  = 'flex';
  loadNotes();
});

// ── LOAD ──
function loadNotes() {
  db.ref('notes/' + currentUser.uid).on('value', snap => {
    notes = snap.val() || {};
    renderList();
  });
}

// ── RENDER LIST ──
function renderList() {
  const search = (document.getElementById('search-inp').value || '').toLowerCase();
  const list   = document.getElementById('notes-list');
  let items    = Object.values(notes).filter(n => {
    if (currentFolder !== 'all' && n.tag !== currentFolder) return false;
    if (search && !n.title.toLowerCase().includes(search) && !n.body.toLowerCase().includes(search)) return false;
    return true;
  });
  // Sort: pinned first, then by updatedAt desc
  items.sort((a,b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return (b.updatedAt||0) - (a.updatedAt||0);
  });

  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><i class="fas fa-sticky-note"></i><p>${search ? 'Không tìm thấy kết quả.' : 'Chưa có ghi chú nào.'}</p></div>`;
    return;
  }

  list.innerHTML = items.map(n => {
    const preview = n.body.replace(/[#*`\[\]]/g,'').slice(0,60) || 'Ghi chú trống';
    const date    = n.updatedAt ? new Date(n.updatedAt).toLocaleDateString('vi-VN') : '';
    return `
      <div class="note-item ${n.id===activeId?'active':''}" data-id="${n.id}"
           onclick="openNote('${n.id}')"
           oncontextmenu="showCtx(event,'${n.id}')">
        ${n.pinned ? '<i class="fas fa-thumbtack note-pin"></i>' : ''}
        <div class="note-item-title">${n.title || 'Không có tiêu đề'}</div>
        <div class="note-item-preview">${preview}</div>
        <div class="note-item-meta">
          <span class="note-item-date">${date}</span>
          ${n.tag ? `<span class="note-item-tag tag-${n.tag}">${tagLabel(n.tag)}</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

function tagLabel(t) {
  return {personal:'Cá nhân',work:'Công việc',project:'Dự án',idea:'Ý tưởng',github:'GitHub'}[t]||t;
}

// ── NEW NOTE ──
function newNote() {
  const id  = 'n_' + Date.now();
  const now = Date.now();
  const note = { id, title:'', body:'', tag: currentFolder==='all'?'personal':currentFolder, pinned:false, createdAt:now, updatedAt:now };
  notes[id] = note;
  db.ref(`notes/${currentUser.uid}/${id}`).set(note);
  openNote(id);
}

// ── OPEN NOTE ──
function openNote(id) {
  activeId = id;
  const n  = notes[id];
  if (!n) return;

  document.getElementById('editor-empty').style.display  = 'none';
  document.getElementById('editor-active').style.display = 'flex';

  document.getElementById('note-title').value = n.title||'';
  document.getElementById('note-body').value  = n.body||'';
  document.getElementById('note-date').textContent = n.updatedAt ? '· ' + new Date(n.updatedAt).toLocaleString('vi-VN') : '';

  // Tags
  document.querySelectorAll('.tag-chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.tag === n.tag);
  });
  // Pin button
  document.getElementById('btn-pin').classList.toggle('active', !!n.pinned);

  updateWordCount();
  setSaveStatus('saved');
  renderList();
}

// ── SAVE ──
function markUnsaved() {
  setSaveStatus('unsaved');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveActive, 1500);
  updateWordCount();
}

function saveActive() {
  if (!activeId || !currentUser) return;
  setSaveStatus('saving');
  const title = document.getElementById('note-title').value;
  const body  = document.getElementById('note-body').value;
  const now   = Date.now();
  const upd   = { title, body, updatedAt: now };
  notes[activeId] = { ...notes[activeId], ...upd };
  db.ref(`notes/${currentUser.uid}/${activeId}`).update(upd)
    .then(() => { setSaveStatus('saved'); renderList(); })
    .catch(() => setSaveStatus('unsaved'));
}

// ── TAG ──
function toggleTag(el) {
  if (!activeId) return;
  const tag = el.dataset.tag;
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  notes[activeId].tag = tag;
  db.ref(`notes/${currentUser.uid}/${activeId}`).update({ tag });
  renderList();
}

// ── TOOLBAR FORMAT ──
function fmt(cmd) {
  const ta = document.getElementById('note-body');
  const {selectionStart:s, selectionEnd:e, value:v} = ta;
  const sel = v.slice(s, e);
  const wrap = cmd==='bold' ? '**' : '_';
  ta.value = v.slice(0,s) + wrap + sel + wrap + v.slice(e);
  ta.selectionStart = s + wrap.length;
  ta.selectionEnd   = e + wrap.length;
  ta.focus();
  markUnsaved();
}
function insertCheckbox() {
  insertAtCursor('- [ ] ');
}
function insertHeading() {
  insertAtCursor('## ');
}
function insertCode() {
  const ta = document.getElementById('note-body');
  const {selectionStart:s, selectionEnd:e, value:v} = ta;
  const sel = v.slice(s,e);
  ta.value = v.slice(0,s) + '`' + (sel||'code') + '`' + v.slice(e);
  ta.focus();
  markUnsaved();
}
function insertLink() {
  const url = prompt('Nhập URL:');
  if (!url) return;
  const label = prompt('Nhập tên hiển thị:', 'Link');
  insertAtCursor(`[${label||url}](${url})`);
}
function insertAtCursor(text) {
  const ta  = document.getElementById('note-body');
  const pos = ta.selectionStart;
  ta.value  = ta.value.slice(0,pos) + text + ta.value.slice(pos);
  ta.selectionStart = ta.selectionEnd = pos + text.length;
  ta.focus();
  markUnsaved();
}

// ── UTILS ──
function updateWordCount() {
  const body = document.getElementById('note-body').value;
  const words = body.trim() ? body.trim().split(/\s+/).length : 0;
  document.getElementById('word-count').textContent  = words + ' từ';
  document.getElementById('char-count').textContent  = body.length + ' ký tự';
}
function setSaveStatus(s) {
  const el = document.getElementById('save-status');
  const states = {
    saved:  ['ok','fas fa-check','Đã lưu'],
    saving: ['saving','fas fa-spinner fa-spin','Đang lưu...'],
    unsaved:['unsaved','fas fa-circle','Chưa lưu']
  };
  const [cls,ico,txt] = states[s];
  el.className = 'save-status '+cls;
  el.innerHTML = `<i class="${ico}"></i> ${txt}`;
}

// ── FOLDER ──
function switchFolder(el) {
  document.querySelectorAll('.folder-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentFolder = el.dataset.folder;
  filterNotes();
}
function filterNotes() { renderList(); }
function addFolder() { toast('Tính năng thư mục tùy chỉnh — sắp ra mắt!','info'); }

// ── CONTEXT MENU ──
function showCtx(e, id) {
  e.preventDefault();
  ctxTargetId = id;
  const m = document.getElementById('ctx-menu');
  m.style.left = Math.min(e.clientX, window.innerWidth-170) + 'px';
  m.style.top  = Math.min(e.clientY, window.innerHeight-180) + 'px';
  m.classList.add('show');
}
document.addEventListener('click', () => document.getElementById('ctx-menu').classList.remove('show'));

function pinNote() {
  const id = ctxTargetId || activeId;
  if (!id || !notes[id]) return;
  const pinned = !notes[id].pinned;
  notes[id].pinned = pinned;
  db.ref(`notes/${currentUser.uid}/${id}`).update({ pinned });
  if (id === activeId) document.getElementById('btn-pin').classList.toggle('active', pinned);
  renderList();
  toast(pinned ? 'Đã ghim ghi chú!' : 'Đã bỏ ghim!');
}
function togglePin() { ctxTargetId = activeId; pinNote(); }

function duplicateNote() {
  const id = ctxTargetId || activeId;
  if (!id || !notes[id]) return;
  const src  = notes[id];
  const nid  = 'n_' + Date.now();
  const copy = { ...src, id:nid, title:'[Copy] '+src.title, pinned:false, createdAt:Date.now(), updatedAt:Date.now() };
  notes[nid] = copy;
  db.ref(`notes/${currentUser.uid}/${nid}`).set(copy);
  openNote(nid);
  toast('Đã nhân đôi ghi chú!');
}
function moveNote() { toast('Kéo thả để chuyển thư mục — sắp ra mắt!','info'); }

function deleteNote() {
  const id = ctxTargetId || activeId;
  if (!id) return;
  if (!confirm('Xoá ghi chú này?')) return;
  db.ref(`notes/${currentUser.uid}/${id}`).remove();
  delete notes[id];
  if (id === activeId) {
    activeId = null;
    document.getElementById('editor-empty').style.display  = 'flex';
    document.getElementById('editor-active').style.display = 'none';
  }
  renderList();
  toast('Đã xoá ghi chú!');
}

function exportNote() {
  if (!activeId || !notes[activeId]) { toast('Chọn ghi chú cần xuất!','info'); return; }
  const n    = notes[activeId];
  const blob = new Blob([`# ${n.title}\n\n${n.body}`], {type:'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = (n.title||'ghi-chu') + '.md';
  a.click();
  URL.revokeObjectURL(url);
  toast('Đã xuất file Markdown!');
}

function toggleView() { toast('Chế độ xem thẻ — sắp ra mắt!','info'); }

function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.className = 'toast '+type+' show';
  const icons = {ok:'check-circle',err:'times-circle',info:'info-circle'};
  t.querySelector('i').className = 'fas fa-'+icons[type];
  document.getElementById('t-msg').textContent = msg;
  setTimeout(()=>t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
